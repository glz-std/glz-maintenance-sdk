version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Agrupa patch+minor en UN solo PR (menos ruido). Los major van sueltos a
      # revisión humana (no auto-merge). El cooldown de pnpm (minimumReleaseAge 72h)
      # da el colchón anti supply-chain.
      patch-minor:
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
